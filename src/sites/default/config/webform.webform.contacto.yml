elements: |-
  titulo:
    '#type': processed_text
    '#wrapper_attributes':
      class:
        - head-forms
    '#text': |
      <h2 class="title-form">Formulario de contacto</h2>

      <p>Los campos marcados con asterisco (*) son obligatorios</p>
    '#format': full_html
  bloque_uno:
    '#type': fieldset
    '#title': 'Bloque uno'
    '#title_display': invisible
    '#description_display': invisible
    nombre:
      '#type': textfield
      '#title': 'full name'
      '#title_display': invisible
      '#required': true
      '#required_error': 'Complete este campo'
      '#placeholder': 'Nombre completo*'
    correo_electronico:
      '#type': email
      '#title': Email
      '#title_display': invisible
      '#placeholder': 'Correo electrónico*'
      '#required': true
      '#required_error': 'Complete este campo'
    telefono_de_contacto:
      '#type': tel
      '#title': 'Telephone contact'
      '#title_display': invisible
      '#required': true
      '#required_error': 'Complete este campo'
      '#placeholder': 'Teléfono de contacto*'
    ciudad:
      '#type': textfield
      '#title': City
      '#title_display': invisible
      '#required': true
      '#required_error': 'Complete este campo'
      '#placeholder': 'Ciudad*'
    empresa:
      '#type': textfield
      '#title': Company
      '#title_display': invisible
      '#required': true
      '#required_error': 'Complete este campo'
      '#placeholder': 'Empresa*'
    nit:
      '#type': textfield
      '#title': Nit
      '#title_display': invisible
      '#placeholder': 'Nit*'
      '#autocomplete': 'off'
      '#required': true
    cargo:
      '#type': textfield
      '#title': Position
      '#title_display': invisible
      '#required': true
      '#required_error': 'Complete este campo'
      '#placeholder': 'Cargo*'
  mensaje:
    '#type': textarea
    '#title': Message
    '#title_display': invisible
    '#required': true
    '#required_error': 'Complete este campo'
    '#placeholder': 'Mensaje*'
  si_doy_autorizacion_expresa_para_el_tratamiento_de_los_datos_aqu:
    '#type': checkbox
    '#title': 'Sí doy autorización expresa para el tratamiento de los datos aquí consignados.'
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': Enviar
