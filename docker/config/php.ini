[PHP]
file_uploads = On
upload_max_filesize = 256M
post_max_size = 256M
expose_php = Off
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED
display_errors = Off
display_startup_errors = Off
log_errors = On
memory_limit = 384M;

[Date]
date.timezone="UTC"

[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.max_accelerated_files=30000
opcache.revalidate_freq=0

# JIT disabled - causes SIGSEGV in PHP 8.3 with Drupal 11 (preventive)
opcache.jit_buffer_size=0
opcache.jit=off