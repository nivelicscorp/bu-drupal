mailchimp_transactional.settings:
  type: config_object
  label: 'Mailchimp Transactional settings'
  mapping:
    from_name:
      type: string
      label: 'Sender name'
    from_email:
      type: string
      label: 'Sender email'
    subaccount:
      type: string
    filter_format:
      type: string
    track_opens:
      type: boolean
    track_clicks:
      type: boolean
    url_strip_qs:
      type: boolean
    analytics_campaign:
      type: string
    analytics_domains:
      type: string
    batch_log_queued:
      type: boolean
    queue_worker_timeout:
      type: integer
    log_defaulted_sends:
      type: boolean
    api_key:
      type: string
    api_timeout:
      type: integer
    api_classname:
      type: string
    mail_key_denylist:
      type: string
    process_async:
      type: boolean
