id: inscripcion_evento
title: 'Inscripción evento gratuito'
description: 'Formulario que se muestra en la barra lateral de cada evento GRATUITO, toma por debajo el ID del evento para segmentar los registros'
categories:
  - Inscripciones
elements: |-
  evento:
    '#type': webform_entity_select
    '#title': Evento
    '#target_type': node
    '#selection_handler': 'default:node'
    '#selection_settings':
      target_bundles:
        evento: evento
  oblogatorios:
    '#type': webform_markup
    '#markup': 'Los campos marcados con * son obligatorios'
  nombre:
    '#type': textfield
    '#title': Nombre
    '#title_display': invisible
    '#placeholder': 'Nombre *'
    '#autocomplete': 'off'
    '#required': true
  apellido:
    '#type': textfield
    '#title': Apellido
    '#title_display': invisible
    '#placeholder': 'Apellido *'
    '#autocomplete': 'off'
    '#required': true
  identificacion:
    '#type': textfield
    '#title': Identificación
    '#title_display': invisible
    '#placeholder': 'Identificación *'
    '#autocomplete': 'off'
    '#required': true
  cargo:
    '#type': textfield
    '#title': Cargo
    '#title_display': invisible
    '#placeholder': 'Cargo *'
    '#autocomplete': 'off'
    '#required': true
  empresa:
    '#type': textfield
    '#title': Empresa
    '#title_display': invisible
    '#placeholder': 'Empresa *'
    '#autocomplete': 'off'
    '#required': true
  celular:
    '#type': number
    '#title': Celular
    '#title_display': invisible
    '#description_display': invisible
    '#minlength': '10'
    '#maxlength': '10'
    '#placeholder': 'Celular *'
    '#required': true
  correo_electronico:
    '#type': email
    '#title': 'Correo electrónico'
    '#title_display': invisible
    '#placeholder': 'Correo electrónico *'
    '#autocomplete': 'off'
    '#required': true
  acepto_los_terminos_y_condiciones:
    '#type': checkbox
    '#title': 'Acepto los Términos y Condiciones'
    '#description': 'Acepto los <a href="/terminos-y-condiciones">T&eacute;rminos y Condiciones</a>'
    '#title_display': invisible
    '#description_display': after
    '#required': true
  grande_contribuyentes:
    '#type': webform_markup
    '#markup': 'Grandes Contribuyentes, res. 8836 de Dic. 18 de 1998. Agentes retenedores de IVA y de ICA.&nbsp;Actividad Econ&oacute;mica 69 y tarifa 6.9 por mil'
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': INSCRÍBASE
