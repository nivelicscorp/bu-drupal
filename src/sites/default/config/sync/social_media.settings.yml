_core:
  default_config_hash: NxysIX37ZMurlmOlFNtEN51CTRK1cIwA50bnN49mGGE
langcode: es
social_media:
  facebook_share:
    enable: 1
    text: Facebook
    api_url: 'http://www.facebook.com/share.php?u=[current-page:url]&title=[current-page:title]'
    api_event: href
    default_img: 1
    weight: 1
    attributes: |-
      target|_blank
      class|facebook-share
  facebook_msg:
    enable: 1
    text: 'Facebook messenger'
    api_url: "FB.ui({method: 'send',link: '[current-page:url]'})"
    api_event: onclick
    default_img: 1
    weight: 2
    attributes: |-
      target|_blank
      class|facebook-msg
    drupalSettings: 'application_id|Your Application ID'
    library: social_media/facebook
  linkedin:
    enable: 1
    text: Linkedin
    api_url: 'http://www.linkedin.com/shareArticle?mini=true&url=[current-page:url]&title=[current-page:title]&source=[current-page:url]'
    api_event: href
    default_img: 1
    weight: 3
    attributes: |-
      target|_blank
      class|linkedin
  twitter:
    enable: 1
    text: Twitter
    api_url: 'https://twitter.com/intent/tweet?url=[current-page:url]&status=[current-page:title]+[current-page:url]'
    api_event: href
    default_img: 1
    weight: 4
    attributes: |-
      target|_blank
      class|twitter
  pinterest:
    enable: 1
    text: Pinterest
    api_url: 'https://www.pinterest.com/pin/create/button/?url=[current-page:url]&description=[current-page:title]'
    api_event: href
    default_img: 1
    weight: 5
    attributes: |-
      target|_blank
      class|pinterest
  email:
    enable: 1
    text: 'Correo electrónico'
    api_url: 'mailto:?subject=[current-page:title]&body=Check out this site [current-page:url]'
    api_event: href
    default_img: 1
    weight: 7
    attributes: class|email
  google_plus:
    enable: 1
    text: 'Google Plus'
    api_url: 'https://plus.google.com/share?url=[current-page:url]'
    api_event: href
    default_img: 1
    weight: 6
    attributes: |-
      target|_blank
      class|google-plus