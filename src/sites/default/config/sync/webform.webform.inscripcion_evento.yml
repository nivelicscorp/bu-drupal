s\"><img src=\"https://bu.com.co/themes/custom/brigard/img/logo-color.png\" alt=\"Brigard Urrutia\" width=\"85\" height=\"42\" style=\"display: block; margin: 0 auto;\"></a>\r\n                        </td>\r\n                    </tr>\r\n                    <tr>\r\n                        <td>\r\n                            <img src=\"https://bu.com.co/themes/custom/brigard/img/email-calendar.jpg\" alt=\"Foto de calendario\">\r\n                        </td>\r\n                    </tr>\r\n                    <tr>\r\n                        <td>\r\n                            <table align=\"center\" width=\"510\" style=\"margin-top: 60px; margin-bottom: 80px;\">\r\n                                    <tr>\r\n                                        <td>\r\n                                            <img src=\"https://bu.com.co/themes/custom/brigard/img/icon-calendar.png\" alt=\"Icono calendario\" height=\"126\" width=\"114\" style=\"margin-right: 20px;\">\r\n                                        </td>\r\n                                        <td>\r\n                                            <p style=\"margin: 0; font-family: 'Palanquin Dark'; color:#1a3172; font-size: 25px; line-height: 28px; margin-bottom: 14px;\">Gracias por inscribirse a nuestro evento</p>\r\n                                            <span style=\"display: block; height: 4px; width: 57px; background: #dd235c;\"></span>\r\n                                            <p style=\"margin: 0; font-family: 'Palanquin'; font-size: 18px; color: #888; margin-top: 10px;\">Le confirmamos que su inscripción fue exitosa.</p>\r\n                                        </td>\r\n                                    </tr>\r\n                            </table>\r\n                        </td>\r\n                    </tr>\r\n                    <tr>\r\n                        <td>\r\n                            <table align=\"center\" style=\"margin-bottom: 20px;\">\r\n                                <tr>\r\n                                    <td style=\"text-align: center; color: #002c78;\"><p style=\"text-align: center; font-family: 'Open Sans', sans-serif; color: #002d73; font-size: 14px;\">Síganos en:</p></td>\r\n                                </tr>\r\n                                <tr>\r\n                                    <td>\r\n                                        <table>\r\n                                            <tr>\r\n                                                <td><a href=\"https://www.facebook.com/BrigardUrrutia\" target=\"_blank\"><img src=\"https://bu.com.co/themes/custom/brigard/img/facebook.jpg\" height=\"50\" width=\"50\" alt=\"Facebook\"></a></td>\r\n                                                <td><a href=\"https://twitter.com/Brigard_Urrutia\" target=\"_blank\"><img src=\"https://bu.com.co/themes/custom/brigard/img/twitter.jpg\" height=\"50\" width=\"50\" alt=\"Twitter\"></a></td>\r\n                                                <td><a href=\"https://www.linkedin.com/company/brigard-urrutia\" target=\"_blank\"><img src=\"https://bu.com.co/themes/custom/brigard/img/linkedin.jpg\" height=\"50\" width=\"50\" alt=\"Linkedin\"></a></td>\r\n                                            </tr>\r\n                                        </table>\r\n                                    </td>\r\n                                </tr>\r\n                            </table>\r\n                        </td>\r\n                    </tr>\r\n                    <tr>\r\n                        <td>\r\n                            <table width=\"100%\" style=\"background: #002c78; padding: 18px 25px;\">\r\n                                <tr>\r\n                                    <td style=\"color: #fff; font-family: 'Open Sans', sans-serif; font-size: 12px;\">&copy; Brigard Urrutia 2018</td>\r\n                                    <td style=\"color: #fff;  text-align: right; font-family: 'Open Sans', sans-serif; font-size: 12px;\"><a href=\"https